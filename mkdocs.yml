# 站点基础信息
site_name: TriggerForge Documentation
repo_url: https://github.com/zybcode/TriggerForge 
repo_name: zybcode/TriggerForge

# 主题配置 (Material for MkDocs)
theme:
  name: material
  language: en
  # 这里的 logo 会作为站点的图标和左上角标识
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.tabs           # 顶部导航栏
    - navigation.indexes        # 目录索引
    - search.highlight          # 搜索高亮
    - search.suggest            # 搜索建议
    - content.code.annotate     # 代码注释支持
    - content.code.copy         # 代码块一键复制

# 插件配置
plugins:
  - search
  - i18n:
      # 移除原先报错的 docs_dir，依靠插件默认的目录结构匹配
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 简体中文
          link: /zh/
          build: true

# 导航栏结构
# 确保你的 docs/en/ 和 docs/zh/ 下存在对应的 md 文件
nav:
  - 首页:
      - English: en/index.md
      - 简体中文: zh/index.md
  - 插件开发规范:
      - English: en/plugin_dev.md
      - 简体中文: zh/plugin_dev.md
  - 配置参考:
      - English: en/configuration.md
      - 简体中文: zh/configuration.md
  - 架构设计:
      - English: en/architecture.md
      - 简体中文: zh/architecture.md
  - 规章制度:
      - English: en/charter.md
      - 简体中文: zh/charter.md
  - 部署指南:
      - English: en/deployment.md
      - 简体中文: zh/deployment.md
  - 安装步骤:
      - English: en/setup.md
      - 简体中文: zh/setup.md

# 扩展配置 (Markdown 增强)
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences